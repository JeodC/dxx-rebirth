name: Package All and Create Release

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - master
    paths-ignore:
      - '**/.github/**'
  pull_request:
    branches:
      - master

jobs:
  package:
    name: Package All
    uses: ./.github/workflows/ci.yml

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs:
      - package
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Display Artifacts
        run: ls -R

      - name: Get Latest Commit SHA
        id: commit
        run: echo "::set-output name=sha::$(git rev-parse --short HEAD)"

      - name: Create Release
        uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
        with:
          tag_name: "continuous"  # Change the tag name to 'prerelease'
          name: "Continuous Build"  # Set the release name
          prerelease: true
          files: '*/*.zip'
          body: |
            This is a continuous build.
      
            [Build Log](https://github.com/JeodC/dxx-rebirth/commit/${{ steps.commit.outputs.sha }})
