name: Package All and Create Release

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - master
    paths-ignore:
      - '**/.github/**'
  pull_request:
    branches:
      - master

jobs:
  package:
    name: Package All
    uses: ./.github/workflows/ci.yml

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs:
      - package
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Display Artifacts
        run: ls -R

      - name: Set up Git
        uses: actions/checkout@v2  # This ensures the git repository is available
        with:
          fetch-depth: 0  # Fetch all history to ensure the latest commit is available

      - name: Set Commit SHA
        id: commit
        run: |
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
        with:
          tag_name: "prerelease"  # Set the release tag to 'prerelease'
          name: "Continuous Build"  # Set the release name
          prerelease: true  # Set as a prerelease
          files: '*/*.zip'
          body: |
            This is a continuous build.
      
            [Build Log](https://github.com/JeodC/dxx-rebirth/commit/${{ env.COMMIT_SHA }})
